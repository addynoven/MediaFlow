<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MediaFlow</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				width: 600px;
				min-height: 500px;
				max-height: 800px;
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
					"Helvetica Neue", sans-serif;
				background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
				color: #e0e0e0;
				overflow-y: auto;
			}

			.container {
				display: flex;
				flex-direction: column;
				min-height: 500px;
				padding: 0;
			}

			.header {
				padding: 24px 20px 16px;
				border-bottom: 1px solid rgba(255, 107, 53, 0.1);
				background: linear-gradient(
					180deg,
					rgba(255, 107, 53, 0.05) 0%,
					transparent 100%
				);
			}

			.header-title {
				font-size: 24px;
				font-weight: 700;
				background: linear-gradient(135deg, #ff6b35 0%, #ffa500 100%);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
				margin-bottom: 4px;
			}

			.header-subtitle {
				font-size: 13px;
				color: #999;
				font-weight: 500;
			}

			.content {
				flex: 1;
				padding: 24px;
				display: flex;
				flex-direction: column;
				gap: 16px;
				overflow-y: auto;
			}

			label {
				font-size: 12px;
				font-weight: 600;
				color: #b0b0b0;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}

			input[type="text"] {
				padding: 14px;
				border: 1px solid rgba(255, 107, 53, 0.2);
				border-radius: 8px;
				background: rgba(255, 255, 255, 0.05);
				color: #e0e0e0;
				font-size: 14px;
				transition: all 0.2s ease;
				width: 100%;
			}

			input[type="text"]:focus {
				outline: none;
				border-color: rgba(255, 107, 53, 0.6);
				background: rgba(255, 255, 255, 0.08);
				box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
			}

			input[type="text"]::placeholder {
				color: #666;
			}

			.format-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 10px;
			}

			.format-btn {
				padding: 14px;
				border: 1px solid rgba(255, 107, 53, 0.2);
				border-radius: 8px;
				background: rgba(255, 107, 53, 0.05);
				color: #e0e0e0;
				font-size: 13px;
				font-weight: 600;
				cursor: pointer;
				transition: all 0.2s ease;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 6px;
				text-transform: uppercase;
				letter-spacing: 0.3px;
				min-height: 50px;
			}

			.format-btn:hover {
				border-color: rgba(255, 107, 53, 0.5);
				background: rgba(255, 107, 53, 0.15);
				transform: translateY(-2px);
			}

			.format-btn.active {
				border-color: #ff6b35;
				background: linear-gradient(
					135deg,
					rgba(255, 107, 53, 0.3) 0%,
					rgba(255, 165, 0, 0.1) 100%
				);
				color: #ffb366;
				box-shadow: 0 4px 12px rgba(255, 107, 53, 0.2);
			}

			.action-buttons {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 12px;
				margin-top: 8px;
			}

			.btn {
				padding: 14px 16px;
				border: none;
				border-radius: 8px;
				font-size: 13px;
				font-weight: 600;
				cursor: pointer;
				transition: all 0.2s ease;
				text-transform: uppercase;
				letter-spacing: 0.3px;
				min-height: 46px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.btn-primary {
				background: linear-gradient(135deg, #ff6b35 0%, #ffa500 100%);
				color: white;
				flex: 1;
			}

			.btn-primary:hover {
				transform: translateY(-2px);
				box-shadow: 0 8px 16px rgba(255, 107, 53, 0.3);
			}

			.btn-primary:active {
				transform: translateY(0);
			}

			.btn-secondary {
				background: rgba(255, 255, 255, 0.1);
				color: #e0e0e0;
				border: 1px solid rgba(255, 255, 255, 0.15);
			}

			.btn-secondary:hover {
				background: rgba(255, 255, 255, 0.15);
				border-color: rgba(255, 255, 255, 0.3);
			}

			.btn:disabled {
				opacity: 0.5;
				cursor: not-allowed;
				transform: none;
			}

			.status-box {
				padding: 14px;
				border-radius: 8px;
				font-size: 13px;
				line-height: 1.5;
				display: none;
				word-wrap: break-word;
			}

			.status-box.show {
				display: block;
			}

			.status-box.info {
				background: rgba(100, 200, 255, 0.1);
				border: 1px solid rgba(100, 200, 255, 0.3);
				color: #64c8ff;
			}

			.status-box.success {
				background: rgba(76, 175, 80, 0.1);
				border: 1px solid rgba(76, 175, 80, 0.3);
				color: #4caf50;
			}

			.status-box.error {
				background: rgba(244, 67, 54, 0.1);
				border: 1px solid rgba(244, 67, 54, 0.3);
				color: #f44336;
			}

			.status-box.warning {
				background: rgba(255, 193, 7, 0.1);
				border: 1px solid rgba(255, 193, 7, 0.3);
				color: #ffc107;
			}

			.loading-spinner {
				display: inline-block;
				width: 12px;
				height: 12px;
				border: 2px solid rgba(255, 107, 53, 0.3);
				border-top-color: #ff6b35;
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
				margin-right: 6px;
				vertical-align: middle;
			}

			/* Select styling */
			select {
				width: 100%;
				padding: 12px;
				border: 1px solid rgba(255, 107, 53, 0.2);
				border-radius: 8px;
				background: rgba(255, 255, 255, 0.05);
				color: #e0e0e0;
				font-size: 14px;
				transition: all 0.2s ease;
				cursor: pointer;
			}

			select:focus {
				outline: none;
				border-color: rgba(255, 107, 53, 0.6);
				background: rgba(255, 255, 255, 0.08);
				box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
			}

			select option {
				background: #1a1f2e;
				color: #e0e0e0;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			.server-check {
				padding: 14px;
				border-radius: 8px;
				background: rgba(255, 193, 7, 0.1);
				border: 1px solid rgba(255, 193, 7, 0.3);
				color: #ffc107;
				font-size: 13px;
				display: flex;
				align-items: center;
				gap: 8px;
			}

			.server-check.connected {
				background: rgba(76, 175, 80, 0.1);
				border-color: rgba(76, 175, 80, 0.3);
				color: #4caf50;
			}

			.dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: currentColor;
				animation: pulse 2s infinite;
			}

			.server-check.connected .dot {
				animation: none;
			}

			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.3;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<div class="header-title">MediaFlow</div>
				<div class="header-subtitle">
					Download videos, audio & images instantly
				</div>
			</div>

			<div class="content">
				<div class="server-check" id="serverCheck">
					<div class="dot"></div>
					<span>Connecting to server...</span>
				</div>

				<div class="url-input-group">
					<label for="urlInput">Media URL</label>
					<input
						type="text"
						id="urlInput"
						placeholder="https://youtube.com/watch?v=..."
						autocomplete="off"
					/>
				</div>

				<div>
					<label style="display: block; margin-bottom: 10px"
						>Select Format</label

					<!-- Quality selection for video -->
					<div class="input-group" id="qualityGroup" style="display: none;">
						<label for="qualitySelect">Video Quality</label>
						<select id="qualitySelect">
							<option value="best">Best Available</option>
							<option value="1080p">1080p (Full HD)</option>
							<option value="720p">720p (HD)</option>
							<option value="480p">480p (SD)</option>
							<option value="360p">360p (Low)</option>
							<option value="240p">240p (Very Low)</option>
						</select>
					</div>

					<!-- Quality selection for audio -->
					<div class="input-group" id="audioQualityGroup" style="display: none;">
						<label for="audioQualitySelect">Audio Quality</label>
						<select id="audioQualitySelect">
							<option value="320">320 kbps (Best)</option>
							<option value="256">256 kbps</option>
							<option value="192">192 kbps (Good)</option>
							<option value="128">128 kbps (Standard)</option>
						</select>
					</div>
					<br>
					<div class="format-grid">
						<button class="format-btn" data-format="video">
							🎬 Video (MP4)
						</button>
						<button class="format-btn" data-format="audio">
							🎵 Audio (MP3)
						</button>
						<button class="format-btn" data-format="webm">▶️ WebM Video</button>
						<button class="format-btn" data-format="image">🖼️ Images</button>
					</div>
				</div>

				<div class="action-buttons">
					<button class="btn btn-primary" id="downloadBtn">Download</button>
					<button class="btn btn-secondary" id="pasteBtn">Paste URL</button>
				</div>

				<div class="status-box" id="statusBox"></div>
			</div>
		</div>

		<script src="popup.js"></script>
	</body>
</html>
